<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お昼の献立表 作成アプリ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f3ee; --surface: #fff; --surface2: #faf9f6;
    --border: #e2ddd6; --text: #2a2520; --text2: #7a736a; --text3: #b0a89e;
    --accent: #c85a2a; --accent-light: #fdf0ea;
    --green: #2d7a4f; --green-light: #eaf5ef;
    --red: #b0362a; --red-light: #fdf0ee;
    --radius: 10px; --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .app-header { text-align: center; margin-bottom: 2rem; }
  .app-header h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.02em; }
  .app-header p { font-size: 13px; color: var(--text2); margin-top: 6px; }
  .section { max-width: 680px; margin: 0 auto 1.2rem; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.5rem; box-shadow: var(--shadow); }
  .section h2 { font-size: 15px; font-weight: 700; margin-bottom: 0.8rem; }
  .section-note { font-size: 12px; color: var(--text2); margin-bottom: 1rem; line-height: 1.7; background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
  .section-note b { color: var(--accent); }

  .paste-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  .paste-box label { font-size: 12px; font-weight: 700; color: var(--text2); display: block; margin-bottom: 4px; }
  .paste-box textarea {
    width: 100%; height: 140px; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; font-size: 12px; font-family: inherit; resize: vertical;
    background: var(--surface2); color: var(--text); line-height: 1.6; transition: border-color 0.2s;
  }
  .paste-box textarea:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  .paste-box textarea.filled { border-color: var(--green); background: var(--green-light); }

  .year-month-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .year-month-row label { font-size: 13px; color: var(--text2); }
  .year-month-row input, .year-month-row select {
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
    font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); width: 90px;
  }

  .hcal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-top: 0.5rem; }
  .hcal-dow { text-align: center; font-size: 10px; color: var(--text3); padding: 2px 0; }
  .hcal-dow.sat { color: #2471a3; } .hcal-dow.sun { color: #c0392b; }
  .hcal-day { text-align: center; font-size: 12px; padding: 5px 2px; border-radius: 6px; cursor: pointer; user-select: none; border: 1px solid transparent; transition: background 0.15s; }
  .hcal-day:hover:not(.inactive):not(.weekend):not(.auto-holiday) { background: var(--accent-light); border-color: var(--accent); }
  .hcal-day.inactive { color: var(--text3); cursor: default; }
  .hcal-day.weekend { color: var(--text3); cursor: default; font-style: italic; }
  .hcal-day.auto-holiday { background: #fef3cd; color: #856404; border-color: #ffc107; cursor: default; font-weight: 500; }
  .hcal-day.custom-off { background: var(--red-light) !important; color: var(--red) !important; border-color: var(--red) !important; font-weight: 700; }
  .holiday-legend { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; border: 1px solid; }
  .legend-dot.holiday { background: #fef3cd; border-color: #ffc107; }
  .legend-dot.custom { background: var(--red-light); border-color: var(--red); }
  .selected-days { margin-top: 8px; font-size: 11px; color: var(--red); min-height: 16px; }

  .generate-btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; transition: opacity 0.2s; letter-spacing: 0.04em; }
  .generate-btn:hover { opacity: 0.88; }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-msg { font-size: 12px; color: var(--red); margin-top: 8px; min-height: 18px; line-height: 1.6; }

  #result-area { display: none; max-width: 900px; margin: 0 auto; }
  #result-area.show { display: block; }
  .result-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .result-title { font-size: 17px; font-weight: 700; }
  .print-btn { padding: 8px 20px; background: var(--text); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; }
  .print-btn:hover { opacity: 0.8; }
  .calendar-wrap { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.5rem; box-shadow: var(--shadow); }
  .cal-title { font-size: 18px; font-weight: 700; margin-bottom: 0.4rem; }
  .cal-note { font-size: 11px; color: var(--text3); margin-bottom: 1.2rem; }
  .header-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-bottom: 6px; }
  .header-cell { text-align: center; font-size: 12px; font-weight: 500; color: var(--text2); padding: 4px 0; }
  .week-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-bottom: 6px; }
  .day-card { border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; min-height: 100px; background: var(--surface); }
  .day-card.empty { background: var(--surface2); border-color: transparent; }
  .day-card.off-day { background: #fafafa; border-color: #eee; }
  .day-head { display: flex; align-items: baseline; gap: 4px; margin-bottom: 6px; }
  .day-num { font-size: 17px; font-weight: 700; line-height: 1; }
  .day-dow { font-size: 10px; color: var(--text3); }
  .off-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 700; margin-bottom: 4px; }
  .off-badge.holiday { background: #fef3cd; color: #856404; }
  .off-badge.custom { background: var(--red-light); color: var(--red); }
  .menu-main { font-size: 11.5px; font-weight: 700; color: var(--accent); line-height: 1.5; margin-bottom: 3px; }
  .menu-sub { font-size: 10.5px; color: var(--text2); line-height: 1.6; }
  .menu-kcal { font-size: 10px; color: var(--text3); margin-top: 5px; }

  @media print {
    body { background: #fff; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .section, .result-toolbar, .app-header { display: none !important; }
    #result-area { display: block !important; max-width: 100%; }
    .calendar-wrap { box-shadow: none; border: none; padding: 0.5cm; }
    .day-card { page-break-inside: avoid; min-height: 80px; }
    .week-row { gap: 4px; margin-bottom: 4px; }
    .header-row { gap: 4px; }
    .menu-main { font-size: 9.5px; } .menu-sub { font-size: 9px; } .menu-kcal { font-size: 8.5px; }
    .day-num { font-size: 14px; } .cal-title { font-size: 15px; margin-bottom: 6px; }
    @page { size: A4 landscape; margin: 1cm; }
  }
</style>
</head>
<body>

<div class="app-header">
  <h1>🍱 お昼の献立表 作成アプリ</h1>
  <p>献立表PDFのテキストを貼り付けるだけで、月〜金のお昼メニュー一覧を自動作成します</p>
</div>

<div class="section">
  <h2>① 献立表のテキストを貼り付け &amp; 年月を選択</h2>
  <div class="section-note">
    PDFを開いて <b>全選択（Ctrl+A）→ コピー（Ctrl+C）</b> し、下のボックスに貼り付けてください。<br>
    前半・後半の2枚それぞれを貼り付けます。貼り付けたらボタンを押すだけで完成！
  </div>
  <div class="paste-grid">
    <div class="paste-box">
      <label>📄 前半（1〜15日頃）</label>
      <textarea id="text1" placeholder="PDFを全選択してコピーし、ここに貼り付け..." oninput="checkReady()"></textarea>
    </div>
    <div class="paste-box">
      <label>📄 後半（16〜末日頃）</label>
      <textarea id="text2" placeholder="PDFを全選択してコピーし、ここに貼り付け..." oninput="checkReady()"></textarea>
    </div>
  </div>
  <div class="year-month-row">
    <label>年</label>
    <input type="number" id="input-year" placeholder="2026" min="2020" max="2040" onchange="refreshCal()">
    <label>月</label>
    <select id="input-month" onchange="refreshCal()">
      <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
      <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
      <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
      <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
    </select>
  </div>
</div>

<div class="section">
  <h2>② 休日・特別休業日を設定</h2>
  <p class="section-note">🔴 キッズアカデミーの休園日は、クリックして献立を非表示にできます。</p>
  <div class="hcal-grid" id="holiday-cal"></div>
  <div class="holiday-legend">
    <div class="legend-item"><div class="legend-dot holiday"></div>祝日（自動）</div>
    <div class="legend-item"><div class="legend-dot custom"></div>特別休業日（手動）</div>
  </div>
  <div class="selected-days" id="selected-days-label"></div>
</div>

<div class="section">
  <h2>③ 献立表を作成</h2>
  <button class="generate-btn" id="gen-btn" onclick="generate()" disabled>献立表を作成する</button>
  <div class="error-msg" id="error-msg"></div>
</div>

<div id="result-area">
  <div class="result-toolbar">
    <div class="result-title" id="result-title"></div>
    <button class="print-btn" onclick="window.print()">🖨️ 印刷する（A4横）</button>
  </div>
  <div class="calendar-wrap">
    <div class="cal-title" id="cal-title"></div>
    <div class="cal-note">※ご飯130gを含むカロリー表示　／　月〜金のお昼のみ抜粋</div>
    <div class="header-row">
      <div class="header-cell">月</div><div class="header-cell">火</div><div class="header-cell">水</div>
      <div class="header-cell">木</div><div class="header-cell">金</div>
    </div>
    <div id="cal-body"></div>
  </div>
</div>

<script>
const DOW = ['日','月','火','水','木','金','土'];
let customOffDays = new Set();
let autoHolidays = {};

// ── 祝日計算 ──
function getJapaneseHolidays(year, month) {
  const h = {};
  const add = (m, d, name) => { if (m === month) h[d] = name; };
  add(1,1,'元日'); add(2,11,'建国記念の日'); add(2,23,'天皇誕生日');
  add(4,29,'昭和の日'); add(5,3,'憲法記念日'); add(5,4,'みどりの日');
  add(5,5,'こどもの日'); add(8,11,'山の日'); add(11,3,'文化の日'); add(11,23,'勤労感謝の日');
  const nthMon = (m, n) => {
    let count = 0;
    for (let d=1; d<=31; d++) {
      const dt = new Date(year, m-1, d);
      if (dt.getMonth() !== m-1) break;
      if (dt.getDay() === 1) { count++; if (count === n) return d; }
    }
    return null;
  };
  const d1=nthMon(1,2); if(d1&&month===1) h[d1]='成人の日';
  const d2=nthMon(7,3); if(d2&&month===7) h[d2]='海の日';
  const d3=nthMon(9,3); if(d3&&month===9) h[d3]='敬老の日';
  const d4=nthMon(10,2); if(d4&&month===10) h[d4]='スポーツの日';
  if (month===3) { const eq=Math.floor(20.8431+0.242194*(year-1980)-Math.floor((year-1980)/4)); h[eq]='春分の日'; }
  if (month===9) { const eq=Math.floor(23.2488+0.242194*(year-1980)-Math.floor((year-1980)/4)); h[eq]='秋分の日'; }
  Object.keys(h).map(Number).forEach(d => {
    if (new Date(year,month-1,d).getDay()===0) {
      let sub=d+1; while(h[sub]) sub++;
      if (new Date(year,month-1,sub).getMonth()===month-1) h[sub]='振替休日';
    }
  });
  return h;
}

function getYM() {
  return {
    year: parseInt(document.getElementById('input-year').value) || new Date().getFullYear(),
    month: parseInt(document.getElementById('input-month').value) || (new Date().getMonth()+1)
  };
}

function refreshCal() {
  const {year, month} = getYM();
  autoHolidays = getJapaneseHolidays(year, month);
  const lastDate = new Date(year, month, 0).getDate();
  const firstDow = new Date(year, month-1, 1).getDay();
  let html = '';
  ['月','火','水','木','金','土','日'].forEach((d,i) => {
    html += `<div class="hcal-dow ${i===5?'sat':i===6?'sun':''}">${d}</div>`;
  });
  const monOffset = (firstDow===0) ? 6 : firstDow-1;
  for (let i=0; i<monOffset; i++) html += `<div class="hcal-day inactive"></div>`;
  for (let d=1; d<=lastDate; d++) {
    const dow = new Date(year, month-1, d).getDay();
    const isWeekend = dow===0||dow===6;
    const isAutoH = !!autoHolidays[d];
    const isCustom = customOffDays.has(d);
    let cls = 'hcal-day';
    if (isWeekend) cls += ' weekend';
    else if (isAutoH) cls += ' auto-holiday';
    else if (isCustom) cls += ' custom-off';
    const onclick = (!isWeekend && !isAutoH) ? `onclick="toggleCustomOff(${d})"` : '';
    const tooltip = isAutoH ? `title="${autoHolidays[d]}"` : '';
    html += `<div class="${cls}" ${onclick} ${tooltip} id="hday-${d}">${d}</div>`;
  }
  document.getElementById('holiday-cal').innerHTML = html;
  updateSelectedLabel();
}

function toggleCustomOff(d) {
  if (customOffDays.has(d)) customOffDays.delete(d);
  else customOffDays.add(d);
  document.getElementById('hday-'+d).classList.toggle('custom-off');
  updateSelectedLabel();
}

function updateSelectedLabel() {
  const {month} = getYM();
  const el = document.getElementById('selected-days-label');
  const autoList = Object.entries(autoHolidays).map(([d,n]) => `${month}/${d}（${n}）`);
  const customList = [...customOffDays].sort((a,b)=>a-b).map(d=>`${month}/${d}`);
  let parts = [];
  if (autoList.length) parts.push('祝日：'+autoList.join('、'));
  if (customList.length) parts.push('特別休業日：'+customList.join('、'));
  el.textContent = parts.length ? parts.join('　') : '特別休業日は設定されていません';
}

function checkReady() {
  const t1 = document.getElementById('text1').value.trim();
  const t2 = document.getElementById('text2').value.trim();
  document.getElementById('gen-btn').disabled = !(t1 && t2);
  document.getElementById('text1').classList.toggle('filled', !!t1);
  document.getElementById('text2').classList.toggle('filled', !!t2);
}

// ── メインのテキスト解析ロジック ──
function parseMenuText(text) {
  // 不要な行を除去
  const skipPatterns = [
    /栄養価は/,/急遽メニュー/,/所沢市/,/TEL/,/配食/,/おかずの特徴/,
    /皆様に飽き/,/全てのおかず/,/100%国内/,/追加注文/,/店員不在/,
    /までにお願い/,/にご伝言/,/小町献立表/,/^\s*[０-９0-9]\s*$/,
    /^[月火水木金土日]$/,/^6\s*月/,/^\s*6\s*$/,/^\s*[１-９]\s*$/,
    /^\s*1[0-9]\s*$/,/^\s*2[0-9]\s*$/,/^\s*3[01]\s*$/,
    /★/,/●/,/【6月/,/限定】/
  ];

  const lines = text.split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 0)
    .filter(l => !skipPatterns.some(p => p.test(l)));

  // 「昼食夕食」ヘッダー行を除去
  const filtered = lines.filter(l => !/^(昼食夕食)+/.test(l) && !/^昼食$/.test(l) && !/^夕食$/.test(l));

  // エネルギー行を境界としてブロックに分割
  const blocks = [];
  let current = [];
  for (const line of filtered) {
    if (/エネルギー/.test(line)) {
      // エネルギーと塩分を抽出
      const kcalMatch = line.match(/エネルギー\s*([\d]+kcal)/);
      const saltLine = filtered[filtered.indexOf(line) + 1] || '';
      const saltMatch = saltLine.match(/塩分\s*([\d.]+g)/);
      if (current.length > 0) {
        blocks.push({
          items: [...current],
          kcal: kcalMatch ? kcalMatch[1] : '',
          salt: saltMatch ? saltMatch[1] : ''
        });
        current = [];
      }
    } else if (/^塩分/.test(line)) {
      // 塩分行はスキップ（上で処理済み）
    } else {
      current.push(line);
    }
  }
  if (current.length > 0) blocks.push({ items: current, kcal: '', salt: '' });

  // 各ブロックから昼食（奇数番目）を抽出
  // ブロック内のアイテムは [昼メイン, 昼副菜1, 昼副菜2, 夕メイン, 夕副菜1, 夕副菜2] の順
  // ただし列数が変わるので、3行ずつ区切って最初の列を取得
  const lunchMenus = [];
  for (const block of blocks) {
    const items = block.items;
    if (items.length === 0) continue;
    // 3行×列数 → 最初の3行が昼食
    const main = items[0] || '';
    const sides = items.slice(1, 3).filter(s => s && s.length > 0);
    if (main && main.length > 1) {
      lunchMenus.push({ main, sides, kcal: block.kcal, salt: block.salt });
    }
  }
  return lunchMenus;
}

// ── 月〜金の平日リストを取得 ──
function getWeekdays(year, month, offDays) {
  const lastDate = new Date(year, month, 0).getDate();
  const weekdays = [];
  for (let d=1; d<=lastDate; d++) {
    const dow = new Date(year, month-1, d).getDay();
    if (dow >= 1 && dow <= 5 && !offDays.has(d) && !autoHolidays[d]) {
      weekdays.push(d);
    }
  }
  return weekdays;
}

// ── メイン生成処理 ──
function generate() {
  document.getElementById('error-msg').textContent = '';
  const {year, month} = getYM();
  const t1 = document.getElementById('text1').value.trim();
  const t2 = document.getElementById('text2').value.trim();

  try {
    // 前半・後半それぞれ解析
    const menus1 = parseMenuText(t1);
    const menus2 = parseMenuText(t2);
    const allMenus = [...menus1, ...menus2];

    if (allMenus.length === 0) {
      document.getElementById('error-msg').textContent = 'メニューを読み取れませんでした。PDFを全選択してコピーし直してください。';
      return;
    }

    // 月〜金の平日に順番に割り当て
    const weekdays = getWeekdays(year, month, customOffDays);
    const menuMap = {};
    weekdays.forEach((date, i) => {
      if (allMenus[i]) menuMap[date] = allMenus[i];
    });

    renderCalendar(menuMap, year, month);
    document.getElementById('result-area').classList.add('show');
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });

  } catch(e) {
    document.getElementById('error-msg').textContent = 'エラー：' + e.message;
    console.error(e);
  }
}

// ── カレンダー描画 ──
function renderCalendar(menuMap, year, month) {
  const allOff = {
    ...Object.fromEntries(Object.entries(autoHolidays).map(([d,n])=>[Number(d),n])),
    ...Object.fromEntries([...customOffDays].map(d=>[d,'特別休業日']))
  };
  const firstDay = new Date(year, month-1, 1).getDay();
  const lastDate = new Date(year, month, 0).getDate();
  const startOffset = (firstDay===0) ? 6 : firstDay-1;
  document.getElementById('cal-title').textContent = `${year}年${month}月　お昼の献立`;
  document.getElementById('result-title').textContent = `${year}年${month}月 献立表`;
  const body = document.getElementById('cal-body');
  body.innerHTML = '';
  let ptr = 1 - startOffset;
  while (ptr <= lastDate) {
    const row = document.createElement('div');
    row.className = 'week-row';
    for (let col=0; col<5; col++) {
      const realDay = ptr + col;
      const card = document.createElement('div');
      if (realDay < 1 || realDay > lastDate) {
        card.className = 'day-card empty';
      } else {
        const dow = new Date(year, month-1, realDay).getDay();
        if (dow !== col+1) {
          card.className = 'day-card empty';
        } else {
          const offName = allOff[realDay];
          const isAutoH = !!autoHolidays[realDay];
          if (offName) {
            card.className = 'day-card off-day';
            card.innerHTML = `<div class="day-head"><span class="day-num">${realDay}</span><span class="day-dow">${DOW[dow]}</span></div><span class="off-badge ${isAutoH?'holiday':'custom'}">${offName}</span>`;
          } else {
            card.className = 'day-card';
            const m = menuMap[realDay];
            card.innerHTML = `
              <div class="day-head"><span class="day-num">${realDay}</span><span class="day-dow">${DOW[dow]}</span></div>
              ${m ? `<div class="menu-main">${m.main}</div><div class="menu-sub">${m.sides.join('／')}</div>${m.kcal||m.salt?`<div class="menu-kcal">${m.kcal}　塩分${m.salt}</div>`:''}` : '<div class="menu-sub" style="color:#ccc">データなし</div>'}`;
          }
        }
      }
      row.appendChild(card);
    }
    body.appendChild(row);
    ptr += 7;
  }
}

// Init
const now = new Date();
document.getElementById('input-year').value = now.getFullYear();
document.getElementById('input-month').value = now.getMonth()+1;
refreshCal();
</script>
